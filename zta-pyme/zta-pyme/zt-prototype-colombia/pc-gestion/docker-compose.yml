services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mgmt_net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    # start-dev is used for the lab environment
    # For production, use: start --optimized
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASS}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
      # Hostname must match the issuer expected by Pomerium
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: "8080"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Edge proxy mode: TLS is terminated by Pomerium
      KC_PROXY: edge
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      - postgres
    networks:
      mgmt_net:
        aliases:
          - keycloak

  pomerium-mgmt:
    image: pomerium/pomerium:v0.32.4
    restart: unless-stopped
    env_file: .env.mgmt
    environment:
      # This node runs the full control plane (PDP)
      SERVICES: authenticate,authorize,databroker
      AUTHENTICATE_SERVICE_URL: https://authenticate.empresa.local
      # Internal gRPC communication within this container
      AUTHORIZE_SERVICE_URL: grpcs://pomerium-mgmt:5443
      DATABROKER_SERVICE_URL: grpcs://pomerium-mgmt:5443
      IDP_PROVIDER: oidc
      IDP_PROVIDER_URL: http://keycloak:8080/realms/empresa
      IDP_CLIENT_ID: pomerium
      IDP_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      SHARED_SECRET: ${POMERIUM_SHARED_SECRET}
      COOKIE_SECRET: ${POMERIUM_COOKIE_SECRET}
      CERTIFICATE_FILE: /certs/pomerium.cert.pem
      CERTIFICATE_KEY_FILE: /certs/pomerium.key.pem
      CERTIFICATE_AUTHORITY_FILE: /certs/ca.cert.pem
    volumes:
      # Certificates generated from internal CA — not included in repo
      - ./pki/issued/pomerium.cert.pem:/certs/pomerium.cert.pem:ro
      - ./pki/issued/pomerium.key.pem:/certs/pomerium.key.pem:ro
      - ./pki/rootCA/ca.cert.pem:/certs/ca.cert.pem:ro
      - ./config/config.yaml:/pomerium/config.yaml:ro
    ports:
      # Bind only to the management VLAN interface
      - "192.168.30.1:443:443"
      - "192.168.30.1:5443:5443"
    depends_on:
      - keycloak
    networks:
      - mgmt_net

volumes:
  postgres_data:

networks:
  mgmt_net:
    driver: bridge
